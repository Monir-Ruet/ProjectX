syntax = "proto3";

package projectx;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

service Identity {
  rpc FindUserByEmail (google.protobuf.StringValue) returns (GUser);
  rpc CreateUser (GUser) returns (google.protobuf.Empty);
  rpc UpdateUser (GUser) returns (google.protobuf.Empty);
  rpc DeleteUserByEmail (google.protobuf.StringValue) returns (google.protobuf.Empty);
}

message GUser {
  string id = 1;
  string name = 2;
  string email = 3;
  string password = 4;
}