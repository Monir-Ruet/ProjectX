syntax = "proto3";

package projectx;

service Auth {
  rpc Login (LoginRequest) returns (AccessTokenResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message AccessTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int32 expire_in = 3;
  string type = 4;
}